name: Deploy to GitHub Pages

# Deploys ONLY on version tags (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Activate jaspr_cli
        run: dart pub global activate jaspr_cli

      - name: Install dependencies
        run: dart pub get

      - name: Build estático do site (Jaspr static mode)
        env:
          BASE_HREF: /calculadora_aha/
        run: jaspr build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static output
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/jaspr
          # Minimum retention (1 day): the artifact only needs to survive
          # until the deploy job picks it up — avoids filling Actions storage.
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
