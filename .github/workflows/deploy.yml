name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; um novo push cancela o deploy anterior em andamento.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Dart SDK (stable)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Instalar jaspr_cli
        # Versão fixa = build reproduzível (mesma do pubspec.yaml).
        run: dart pub global activate jaspr_cli 0.23.2

      - name: Resolver dependências
        run: dart pub get

      - name: Build estático do site (Jaspr static mode)
        env:
          BASE_HREF: /calculadora_aha/
        run: jaspr build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar artefato (build/jaspr/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/jaspr/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
